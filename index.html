<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Tracing London Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  padding: 0;
}

#map {
  height: 100vh;
  width: 100%;
}

.popup-content {
  font-size: 14px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// Create map centred on London
const map = L.map('map').setView([51.5096, -0.08227], 12);

// Map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap contributors'
}).addTo(map);


// LOCATIONS
const locations = [

{
  title: "St Dunstan-in-the-East",
  coords: [51.5096, -0.08227],
  article: "https://open.substack.com/pub/tracinglondon/p/st-dunstan-in-the-east-a-timeless-legacy?r=1undwi&utm_medium=ios",
  video: null,
  description: "A bombed-out Wren church transformed into a hidden garden."
},

{
  title: "Tower 42",
  coords: [51.51532, -0.08443],
  article: "https://open.substack.com/pub/tracinglondon/p/tower-42?r=1undwi&utm_medium=ios",
  video: null,
  description: "Once Britain's tallest building, rising from the financial heart of the City."
},

{
  title: "Philpot Lane",
  coords: [51.51079, -0.08424],
  article: "",
  video: null,
  description: "Site of the famous Philpot Lane mice."
},

{
  title: "The Town of Ramsgate Pub",
  coords: [51.50352, -0.06193],
  article: "https://open.substack.com/pub/tracinglondon/p/the-town-of-ramsgate-pub?r=1undwi&utm_medium=ios",
  video: null,
  description: "A riverside pub steeped in smuggling lore and dockside history."
},

{
  title: "The Pissoir of Star Yard",
  coords: [51.51559, -0.11251],
  article: "https://open.substack.com/pub/tracinglondon/p/the-pissoir-of-star-yard?r=1undwi&utm_medium=ios",
  video: null,
  description: "A rare surviving Victorian public urinal hidden in Soho."
},

{
  title: "Handel & Hendrix Museum",
  coords: [51.51309, -0.14606],
  article: "https://open.substack.com/pub/tracinglondon/p/handel-and-hendrix-a-musical-tapestry?r=1undwi&utm_medium=ios",
  video: null,
  description: "Two musical legends, one historic Mayfair address."
},

{
  title: "The Star Tavern",
  coords: [51.49841, -0.15562],
  article: "https://open.substack.com/pub/tracinglondon/p/the-star-tavern?r=1undwi&utm_medium=ios",
  video: null,
  description: "A historic Belgravia pub tied to espionage and the Great Train Robbery."
},

{
  title: "Findlater's Corner",
  coords: [51.50615, -0.08823],
  article: "https://open.substack.com/pub/tracinglondon/p/findlaters-corner?r=1undwi&utm_medium=ios",
  video: null,
  description: "A surviving fragment of Victorian wine merchant grandeur."
},

{
  title: "George Peabody Statue",
  coords: [51.51399, -0.08663],
  article: "https://open.substack.com/pub/tracinglondon/p/post-1?r=1undwi&utm_medium=ios",
  video: null,
  description: "A tribute to one of London’s greatest philanthropic figures."
},

{
  title: "Greenwich Foot Tunnel",
  coords: [51.48321, 0.01004],
  article: "https://open.substack.com/pub/tracinglondon/p/the-greenwich-foot-tunnel-a-walk-through-history?r=1undwi&utm_medium=ios",
  video: null,
  description: "A historic tunnel beneath the Thames linking Greenwich and the Isle of Dogs."
},

{
  title: "Broadwalk at Canada Water",
  coords: [51.49762, -0.04953],
  article: "https://open.substack.com/pub/tracinglondon/p/londons-newest-bridge?r=1undwi&utm_medium=ios",
  video: null,
  description: "A striking new pedestrian bridge in Canada Water’s regeneration."
},

{
  title: "The Hoover Building",
  coords: [51.53334, -0.31842],
  article: "https://open.substack.com/pub/tracinglondon/p/the-hoover-building-londons-art-deco-gem-on-the-a40?r=1undwi&utm_medium=ios",
  video: null,
  description: "One of London’s finest Art Deco industrial buildings."
}

];


// ADD PINS
locations.forEach(place => {

  let popupContent = `
    <div class="popup-content">
      <strong>${place.title}</strong><br>
      ${place.description}<br><br>
  `;

  if (place.video) {
    popupContent += `
      <iframe width="250" height="140"
      src="${place.video}"
      frameborder="0"
      allowfullscreen></iframe><br>
    `;
  } else {
    popupContent += `<em>Video coming soon</em><br>`;
  }

  if (place.article) {
    popupContent += `
      <br>
      <a href="${place.article}" target="_blank">
        Read the full story
      </a>
    `;
  }

  popupContent += `</div>`;

  L.marker(place.coords)
    .addTo(map)
    .bindPopup(popupContent);

});

</script>

</body>
</html>

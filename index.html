<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Tracing London Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
body {
  margin: 0;
  padding: 0;
  background: #faf8f3;
  font-family: -apple-system, system-ui, sans-serif;
  color: #1a1714;
}

#map {
  height: 100vh;
  width: 100%;
}

.leaflet-popup-content-wrapper {
  background: #f5f0e6;
  color: #1a1714;
  border: 1px solid #ddd5c4;
  border-radius: 8px;
}

.leaflet-popup-tip {
  background: #f5f0e6;
}

.popup-content {
  font-size: 14px;
}

.popup-content strong {
  font-size: 16px;
  display: block;
  margin-bottom: 4px;
}

.popup-content em {
  color: #7a7468;
  font-size: 12px;
}

.popup-content a {
  color: #b8924a;
  text-decoration: none;
  display: inline-block;
  margin-top: 6px;
  font-weight: 600;
}

.popup-content a:hover {
  color: #d4aa6a;
}

.custom-cluster {
  background: rgba(184,146,74,0.2);
  border-radius: 50%;
}

.custom-cluster div {
  background: #b8924a;
  color: #1a1714;
  border: 2px solid #1a1714;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  line-height: 36px;
  text-align: center;
  font-weight: bold;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

// MAP
const map = L.map('map', { maxZoom: 18 })
  .setView([51.5096, -0.08227], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap contributors'
}).addTo(map);

// LIMIT TO LONDON
map.setMaxBounds([
  [51.28, -0.5],
  [51.7, 0.3]
]);

// ICON
const goldIcon = L.divIcon({
  className: "",
  html: `
    <svg width="40" height="56" viewBox="0 0 30 42">
      <path d="M15 0C7 0 1 6 1 14c0 10 14 28 14 28s14-18 14-28C29 6 23 0 15 0z"
        fill="#b8924a"
        stroke="#1a1714"
        stroke-width="2"/>
      <circle cx="15" cy="14" r="5"
        fill="#faf8f3"
        stroke="#1a1714"
        stroke-width="2"/>
    </svg>
  `,
  iconSize: [40, 56],
  iconAnchor: [20, 56],
  popupAnchor: [0, -46]
});

// LOCATIONS WITH IDs
const locations = [

{ id:"st-dunstan", title:"St Dunstan-in-the-East", coords:[51.5096,-0.08227],
article:"https://open.substack.com/pub/tracinglondon/p/st-dunstan-in-the-east-a-timeless-legacy?r=1undwi&utm_medium=ios",
video:null, description:"A bombed-out Wren church turned garden." },

{ id:"tower-42", title:"Tower 42", coords:[51.51532,-0.08443],
article:"https://open.substack.com/pub/tracinglondon/p/tower-42?r=1undwi&utm_medium=ios",
video:null, description:"Once Britain’s tallest building." },

{ id:"philpot-lane", title:"Philpot Lane", coords:[51.51079,-0.08424],
article:"", video:null, description:"Site of the famous mice." },

{ id:"ramsgate-pub", title:"Town of Ramsgate", coords:[51.50352,-0.06193],
article:"https://open.substack.com/pub/tracinglondon/p/the-town-of-ramsgate-pub?r=1undwi&utm_medium=ios",
video:null, description:"Smuggling lore by the Thames." },

{ id:"star-yard", title:"Star Yard Pissoir", coords:[51.51562,-0.11254],
article:"https://open.substack.com/pub/tracinglondon/p/the-pissoir-of-star-yard?r=1undwi&utm_medium=ios",
video:null, description:"Victorian public urinal." },

{ id:"hendrix", title:"Handel & Hendrix", coords:[51.51309,-0.14606],
article:"https://open.substack.com/pub/tracinglondon/p/handel-and-hendrix-a-musical-tapestry?r=1undwi&utm_medium=ios",
video:null, description:"Two legends, one house." },

{ id:"star-tavern", title:"Star Tavern", coords:[51.49841,-0.15562],
article:"https://open.substack.com/pub/tracinglondon/p/the-star-tavern?r=1undwi&utm_medium=ios",
video:null, description:"Espionage & robbery links." },

{ id:"findlaters", title:"Findlater's Corner", coords:[51.50615,-0.08823],
article:"https://open.substack.com/pub/tracinglondon/p/findlaters-corner?r=1undwi&utm_medium=ios",
video:null, description:"Victorian wine merchant." },

{ id:"peabody", title:"George Peabody", coords:[51.51399,-0.08663],
article:"https://open.substack.com/pub/tracinglondon/p/post-1?r=1undwi&utm_medium=ios",
video:null, description:"Philanthropic giant." },

{ id:"greenwich-tunnel", title:"Greenwich Foot Tunnel", coords:[51.48321,-0.01004],
article:"https://open.substack.com/pub/tracinglondon/p/the-greenwich-foot-tunnel-a-walk-through-history?r=1undwi&utm_medium=ios",
video:null, description:"Tunnel under the Thames." },

{ id:"hoover", title:"Hoover Building", coords:[51.53334,-0.31842],
article:"https://open.substack.com/pub/tracinglondon/p/the-hoover-building-londons-art-deco-gem-on-the-a40?r=1undwi&utm_medium=ios",
video:null, description:"Art Deco masterpiece." },

{ id:"houndsditch", title:"Houndsditch", coords:[51.51505,-0.07815],
article:"https://open.substack.com/pub/tracinglondon/p/whats-in-a-name-houndsditch?r=1undwi&utm_medium=ios",
video:null, description:"Grim medieval origins." },

{ id:"plague-pits", title:"Charterhouse Plague Pits", coords:[51.52073,-0.09928],
article:"https://open.substack.com/pub/tracinglondon/p/the-plague-pits-of-charterhouse-square-unearthing-londons-black-death-past?r=1undwi&utm_medium=ios",
video:null, description:"Black Death burial site." },

{ id:"london-bridge", title:"London Bridge", coords:[51.50933,-0.08711],
article:"https://open.substack.com/pub/tracinglondon/p/london-bridge-a-definitive-history?r=1undwi&utm_medium=ios",
video:null, description:"2,000 years of crossings." },

{ id:"roman-wall", title:"Roman Wall", coords:[51.51744,-0.08967],
article:"https://open.substack.com/pub/tracinglondon/p/the-car-park-that-preserved-a-roman?r=1undwi&utm_medium=ios",
video:null, description:"Hidden Roman remains." },

{ id:"methane-lamp", title:"Methane Lamp", coords:[51.50988,-0.12071],
article:"https://open.substack.com/pub/tracinglondon/p/lit-by-londons-fumes-the-story-of?r=1undwi&utm_medium=ios",
video:null, description:"Lamp powered by sewer gas." },

{ id:"aldwych", title:"Aldwych", coords:[51.51315,-0.11765],
article:"https://open.substack.com/pub/tracinglondon/p/the-aldwych-londons-crescent-of-secrets?r=1undwi&utm_medium=ios",
video:null, description:"Built over lost streets." },

{ id:"fetter-lane", title:"Fetter Lane Mystery", coords:[51.51579,-0.10913],
article:"https://open.substack.com/pub/tracinglondon/p/the-cruel-mistress-of-fetter-lane?r=1undwi&utm_medium=ios",
video:null, description:"A dark London tale." }

];

// STORE MARKERS
const markerMap = {};

// CLUSTER
const markers = L.markerClusterGroup({
  iconCreateFunction: c => L.divIcon({
    html: `<div>${c.getChildCount()}+</div>`,
    className: 'custom-cluster',
    iconSize: [40,40]
  })
});

// ADD MARKERS
const bounds = [];

locations.forEach(place => {

  bounds.push(place.coords);

  let popup = `
    <div class="popup-content">
    <strong>${place.title}</strong><br>
    ${place.description}<br><br>
    ${place.video ? `<iframe width="250" height="140" src="${place.video}"></iframe>` : `<em>Video coming soon</em>`}
  `;

  if(place.article){
    popup += `<br><a href="${place.article}" target="_blank">Read the full story</a>`;
  }

  popup += `</div>`;

  const marker = L.marker(place.coords,{icon:goldIcon})
    .bindPopup(popup);

  marker.on('click', () => {
    map.setView(place.coords,16,{animate:true});
  });

  markerMap[place.id] = marker;
  markers.addLayer(marker);
});

map.addLayer(markers);

map.fitBounds(bounds,{padding:[30,30],maxZoom:15});

// DEEP LINKING
const params = new URLSearchParams(window.location.search);
const target = params.get('location');

if(target && markerMap[target]){
  setTimeout(()=>{
    const marker = markerMap[target];
    map.setView(marker.getLatLng(),16);
    marker.openPopup();
  },500);
}

</script>

</body>
</html>

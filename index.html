<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Tracing London Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<style>
body {
  margin: 0;
  padding: 0;
  background: #faf8f3;
  font-family: -apple-system, system-ui, sans-serif;
  color: #1a1714;
}

#map {
  height: 100vh;
  width: 100%;
}

/* FILTER BUTTONS */
.controls {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 1000;
  background: #f5f0e6;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd5c4;
}

.controls button {
  display: block;
  margin: 5px 0;
  padding: 6px 10px;
  background: #b8924a;
  color: #1a1714;
  border: none;
  cursor: pointer;
}

.controls button.active {
  background: #d4aa6a;
}

/* CLUSTER STYLE */
.marker-cluster {
  background: transparent;
}

.marker-cluster div {
  background: #b8924a;
  border: 2px solid #1a1714;
  color: #1a1714;
  font-weight: bold;
  border-radius: 50%;
}

/* POPUPS */
.leaflet-popup-content-wrapper {
  background: #f5f0e6;
  border: 1px solid #ddd5c4;
}

.popup-content a {
  color: #b8924a;
}
</style>
</head>

<body>

<div class="controls">
  <button onclick="toggleCategory('all')" class="active">All</button>
  <button onclick="toggleCategory('architecture')">Architecture</button>
  <button onclick="toggleCategory('crime')">Crime</button>
  <button onclick="toggleCategory('oddities')">Oddities</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

const map = L.map('map').setView([51.5096, -0.08227], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap contributors'
}).addTo(map);


// ICON BUILDER (different colours)
function createIcon(color) {
  return L.divIcon({
    html: `
      <svg width="40" height="56" viewBox="0 0 30 42">
        <path d="M15 0C7 0 1 6 1 14c0 10 14 28 14 28s14-18 14-28C29 6 23 0 15 0z"
          fill="${color}"
          stroke="#1a1714"
          stroke-width="2"/>
      </svg>
    `,
    iconSize: [40,56],
    iconAnchor: [20,56]
  });
}

const icons = {
  architecture: createIcon("#b8924a"),
  crime: createIcon("#7a7268"),
  oddities: createIcon("#d4aa6a"),
  general: createIcon("#1a1714")
};


// DATA WITH CATEGORIES
const locations = [

{ title:"St Dunstan-in-the-East", coords:[51.5096,-0.08227], category:"architecture", article:"https://open.substack.com/pub/tracinglondon/p/st-dunstan-in-the-east-a-timeless-legacy?r=1undwi&utm_medium=ios" },

{ title:"Tower 42", coords:[51.51532,-0.08443], category:"architecture", article:"https://open.substack.com/pub/tracinglondon/p/tower-42?r=1undwi&utm_medium=ios" },

{ title:"Philpot Lane", coords:[51.51079,-0.08424], category:"oddities", article:"" },

{ title:"The Town of Ramsgate Pub", coords:[51.50352,-0.06193], category:"general", article:"https://open.substack.com/pub/tracinglondon/p/the-town-of-ramsgate-pub?r=1undwi&utm_medium=ios" },

{ title:"The Pissoir of Star Yard", coords:[51.51562,-0.11254], category:"oddities", article:"https://open.substack.com/pub/tracinglondon/p/the-pissoir-of-star-yard?r=1undwi&utm_medium=ios" },

{ title:"Handel & Hendrix Museum", coords:[51.51309,-0.14606], category:"architecture", article:"https://open.substack.com/pub/tracinglondon/p/handel-and-hendrix-a-musical-tapestry?r=1undwi&utm_medium=ios" },

{ title:"The Star Tavern", coords:[51.49841,-0.15562], category:"crime", article:"https://open.substack.com/pub/tracinglondon/p/the-star-tavern?r=1undwi&utm_medium=ios" },

{ title:"Findlater's Corner", coords:[51.50615,-0.08823], category:"architecture", article:"https://open.substack.com/pub/tracinglondon/p/findlaters-corner?r=1undwi&utm_medium=ios" },

{ title:"George Peabody Statue", coords:[51.51399,-0.08663], category:"general", article:"https://open.substack.com/pub/tracinglondon/p/post-1?r=1undwi&utm_medium=ios" },

{ title:"Greenwich Foot Tunnel", coords:[51.48321,-0.01004], category:"architecture", article:"https://open.substack.com/pub/tracinglondon/p/the-greenwich-foot-tunnel-a-walk-through-history?r=1undwi&utm_medium=ios" },

{ title:"Broadwalk at Canada Water", coords:[51.49762,-0.04953], category:"architecture", article:"https://open.substack.com/pub/tracinglondon/p/londons-newest-bridge?r=1undwi&utm_medium=ios" },

{ title:"The Hoover Building", coords:[51.53334,-0.31842], category:"architecture", article:"https://open.substack.com/pub/tracinglondon/p/the-hoover-building-londons-art-deco-gem-on-the-a40?r=1undwi&utm_medium=ios" },

{ title:"Houndsditch", coords:[51.51484,-0.07789], category:"oddities", article:"https://open.substack.com/pub/tracinglondon/p/whats-in-a-name-houndsditch?r=1undwi&utm_medium=ios" },

{ title:"Notting Hill Carnival Northern Route", coords:[51.52642,-0.21523], category:"general", article:"https://open.substack.com/pub/tracinglondon/p/the-history-of-notting-hill-carnival?r=1undwi&utm_medium=ios" },

{ title:"The Ancient House", coords:[51.58454,-0.01167], category:"architecture", article:"https://open.substack.com/pub/tracinglondon/p/the-ancient-house-the-oldest-house-in-london-youve-probably-never-heard-of?r=1undwi&utm_medium=ios" }

];


// CLUSTER GROUP
const markers = L.markerClusterGroup();

// STORE MARKERS
let allMarkers = [];

// ADD MARKERS
locations.forEach(place => {

  let popup = `<strong>${place.title}</strong><br>
  <a href="${place.article}" target="_blank">Read more</a>`;

  const marker = L.marker(place.coords, { icon: icons[place.category] })
    .bindPopup(popup);

  marker.category = place.category;

  markers.addLayer(marker);
  allMarkers.push(marker);
});

map.addLayer(markers);


// FILTER FUNCTION
function toggleCategory(cat) {

  markers.clearLayers();

  allMarkers.forEach(marker => {
    if (cat === "all" || marker.category === cat) {
      markers.addLayer(marker);
    }
  });

  document.querySelectorAll(".controls button").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");
}

</script>

</body>
</html>

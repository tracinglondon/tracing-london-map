<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Tracing London Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Marker Cluster CSS -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
body {
  margin: 0;
  padding: 0;
  background: #faf8f3;
  font-family: -apple-system, system-ui, sans-serif;
  color: #1a1714;
}

#map {
  height: 100vh;
  width: 100%;
}

/* Popup styling */
.leaflet-popup-content-wrapper {
  background: #f5f0e6;
  color: #1a1714;
  border: 1px solid #ddd5c4;
  border-radius: 8px;
}

.leaflet-popup-tip {
  background: #f5f0e6;
}

.popup-content {
  font-size: 14px;
}

.popup-content strong {
  font-size: 16px;
  display: block;
  margin-bottom: 4px;
}

.popup-content em {
  color: #7a7468;
  font-size: 12px;
}

.popup-content a {
  color: #b8924a;
  text-decoration: none;
  display: inline-block;
  margin-top: 6px;
  font-weight: 600;
}

.popup-content a:hover {
  color: #d4aa6a;
}

/* Custom cluster styling */
.custom-cluster {
  background: rgba(184,146,74,0.2);
  border-radius: 50%;
}

.custom-cluster div {
  background: #b8924a;
  color: #1a1714;
  border: 2px solid #1a1714;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  line-height: 36px;
  text-align: center;
  font-weight: bold;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Marker Cluster JS -->
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

// Create map
const map = L.map('map', {
  maxZoom: 18
}).setView([51.5096, -0.08227], 13);

// Map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap contributors'
}).addTo(map);

// Limit map to London area
const londonBounds = [
  [51.28, -0.5],
  [51.7, 0.3]
];
map.setMaxBounds(londonBounds);

// BIG GOLD ICON
const goldIcon = L.divIcon({
  className: "",
  html: `
    <svg width="40" height="56" viewBox="0 0 30 42">
      <path d="M15 0C7 0 1 6 1 14c0 10 14 28 14 28s14-18 14-28C29 6 23 0 15 0z"
        fill="#b8924a"
        stroke="#1a1714"
        stroke-width="2"/>
      <circle cx="15" cy="14" r="5"
        fill="#faf8f3"
        stroke="#1a1714"
        stroke-width="2"/>
    </svg>
  `,
  iconSize: [40, 56],
  iconAnchor: [20, 56],
  popupAnchor: [0, -46]
});

// LOCATIONS
const locations = [

{
  title: "St Dunstan-in-the-East",
  coords: [51.5096, -0.08227],
  article: "https://open.substack.com/pub/tracinglondon/p/st-dunstan-in-the-east-a-timeless-legacy?r=1undwi&utm_medium=ios",
  video: null,
  description: "A bombed-out Wren church transformed into a hidden garden."
},

{
  title: "Tower 42",
  coords: [51.51532, -0.08443],
  article: "https://open.substack.com/pub/tracinglondon/p/tower-42?r=1undwi&utm_medium=ios",
  video: null,
  description: "Once Britain's tallest building, rising from the financial heart of the City."
},

{
  title: "Philpot Lane",
  coords: [51.51079, -0.08424],
  article: "",
  video: null,
  description: "Site of the famous Philpot Lane mice."
},

{
  title: "The Town of Ramsgate Pub",
  coords: [51.50352, -0.06193],
  article: "https://open.substack.com/pub/tracinglondon/p/the-town-of-ramsgate-pub?r=1undwi&utm_medium=ios",
  video: null,
  description: "A riverside pub steeped in smuggling lore and dockside history."
},

{
  title: "The Pissoir of Star Yard",
  coords: [51.51562, -0.11254],
  article: "https://open.substack.com/pub/tracinglondon/p/the-pissoir-of-star-yard?r=1undwi&utm_medium=ios",
  video: null,
  description: "A rare surviving Victorian public urinal hidden in Soho."
},

{
  title: "Handel & Hendrix Museum",
  coords: [51.51309, -0.14606],
  article: "https://open.substack.com/pub/tracinglondon/p/handel-and-hendrix-a-musical-tapestry?r=1undwi&utm_medium=ios",
  video: null,
  description: "Two musical legends, one historic Mayfair address."
},

{
  title: "The Star Tavern",
  coords: [51.49841, -0.15562],
  article: "https://open.substack.com/pub/tracinglondon/p/the-star-tavern?r=1undwi&utm_medium=ios",
  video: null,
  description: "A historic Belgravia pub tied to espionage and the Great Train Robbery."
},

{
  title: "Findlater's Corner",
  coords: [51.50615, -0.08823],
  article: "https://open.substack.com/pub/tracinglondon/p/findlaters-corner?r=1undwi&utm_medium=ios",
  video: null,
  description: "A surviving fragment of Victorian wine merchant grandeur."
},

{
  title: "George Peabody Statue",
  coords: [51.51399, -0.08663],
  article: "https://open.substack.com/pub/tracinglondon/p/post-1?r=1undwi&utm_medium=ios",
  video: null,
  description: "A tribute to one of London’s greatest philanthropic figures."
},

{
  title: "Greenwich Foot Tunnel",
  coords: [51.48321, -0.01004],
  article: "https://open.substack.com/pub/tracinglondon/p/the-greenwich-foot-tunnel-a-walk-through-history?r=1undwi&utm_medium=ios",
  video: null,
  description: "A historic tunnel beneath the Thames linking Greenwich and the Isle of Dogs."
},

{
  title: "Broadwalk at Canada Water",
  coords: [51.49762, -0.04953],
  article: "https://open.substack.com/pub/tracinglondon/p/londons-newest-bridge?r=1undwi&utm_medium=ios",
  video: null,
  description: "A striking new pedestrian bridge in Canada Water’s regeneration."
},

{
  title: "The Hoover Building",
  coords: [51.53334, -0.31842],
  article: "https://open.substack.com/pub/tracinglondon/p/the-hoover-building-londons-art-deco-gem-on-the-a40?r=1undwi&utm_medium=ios",
  video: null,
  description: "One of London’s finest Art Deco industrial buildings."
},

{
  title: "Houndsditch",
  coords: [51.51484, -0.07789],
  article: "https://open.substack.com/pub/tracinglondon/p/whats-in-a-name-houndsditch?r=1undwi&utm_medium=ios",
  video: null,
  description: "A street name rooted in one of London’s grimmer medieval practices."
},

{
  title: "Notting Hill Carnival Northern Route",
  coords: [51.52642, -0.21523],
  article: "https://open.substack.com/pub/tracinglondon/p/the-history-of-notting-hill-carnival?r=1undwi&utm_medium=ios",
  video: null,
  description: "Part of the route of Europe’s largest street festival."
},

{
  title: "The Ancient House",
  coords: [51.58454, -0.01167],
  article: "https://open.substack.com/pub/tracinglondon/p/the-ancient-house-the-oldest-house-in-london-youve-probably-never-heard-of?r=1undwi&utm_medium=ios",
  video: null,
  description: "A little-known contender for one of London’s oldest surviving houses."
}

];

// CREATE CLUSTER GROUP WITH CUSTOM ICONS
const markers = L.markerClusterGroup({
  iconCreateFunction: function(cluster) {
    const count = cluster.getChildCount();

    return L.divIcon({
      html: `<div>${count}+</div>`,
      className: 'custom-cluster',
      iconSize: [40, 40]
    });
  }
});

// ADD MARKERS
const bounds = [];

locations.forEach(place => {

  bounds.push(place.coords);

  let popupContent = `
    <div class="popup-content">
      <strong>${place.title}</strong><br>
      ${place.description}<br><br>
  `;

  if (place.video) {
    popupContent += `
      <iframe width="250" height="140"
      src="${place.video}"
      frameborder="0"
      allowfullscreen></iframe><br>
    `;
  } else {
    popupContent += `<em>Video coming soon</em><br>`;
  }

  if (place.article && place.article.trim() !== "") {
    popupContent += `
      <br>
      <a href="${place.article}" target="_blank">
        Read the full story
      </a>
    `;
  }

  popupContent += `</div>`;

  const marker = L.marker(place.coords, { icon: goldIcon })
    .bindPopup(popupContent);

  // Zoom in on click
  marker.on('click', function() {
    map.setView(place.coords, 16, { animate: true });
  });

  markers.addLayer(marker);

});

// Add cluster layer
map.addLayer(markers);

// Fit map to all markers nicely
map.fitBounds(bounds, {
  padding: [30, 30],
  maxZoom: 15
});

</script>

</body>
</html>
